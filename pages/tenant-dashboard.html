<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Dashboard — TMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:      #4A9EFF;
      --blue-l:    #7BBFFF;
      --dark:      #07090D;
      --dark2:     #0C1018;
      --card:      rgba(16,22,32,0.95);
      --border:    rgba(74,158,255,0.15);
      --text:      #E8EDF5;
      --muted:     #566070;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; display: flex; overflow: hidden;
    }

    /* BG */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(74,158,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(78,205,196,0.04) 0%, transparent 60%),
        linear-gradient(160deg, #07090D 0%, #0C1018 100%);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(74,158,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,158,255,0.025) 1px, transparent 1px);
      background-size: 55px 55px;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 230px;
      background: rgba(10,14,22,0.97); backdrop-filter: blur(24px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50; padding: 0;
    }
    .sidebar-head {
      padding: 28px 22px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo-box {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-l) 100%);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(74,158,255,0.3);
    }
    .logo-box svg { width: 22px; height: 22px; fill: #fff; }
    .sidebar-head h2 {
      font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--blue-l));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-head p { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .nav-section { padding: 18px 14px 8px; }
    .nav-label { font-size: 10px; color: var(--muted); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 600; padding: 0 8px 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px; border-radius: 10px;
      color: var(--muted); font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; margin-bottom: 2px;
      text-decoration: none; border: none; background: none; width: 100%;
    }
    .nav-item svg { width: 17px; height: 17px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .nav-item:hover { color: var(--text); background: rgba(74,158,255,0.07); }
    .nav-item.active { color: var(--blue); background: rgba(74,158,255,0.1); font-weight: 600; }

    .sidebar-foot {
      margin-top: auto;
      padding: 16px 22px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--blue), var(--blue-l)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-role { font-size: 11px; color: var(--muted); }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; padding: 5px; color: var(--muted); transition: color 0.2s; }
    .logout-btn:hover { color: #FF6B6B; }
    .logout-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

    /* MAIN */
    .main { margin-left: 230px; flex: 1; position: relative; z-index: 1; min-height: 100vh; overflow-y: auto; padding: 36px 40px; }
    .page { display: none; animation: fadeUp 0.35s ease both; }
    .page.active { display: block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* TOPBAR */
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; }
    .pg-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
    .pg-sub { color: var(--muted); font-size: 13px; margin-top: 5px; }
    .role-pill { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 20px; background: rgba(74,158,255,0.09); border: 1px solid rgba(74,158,255,0.2); color: var(--blue); font-size: 12px; font-weight: 600; }

    /* 3D CARD */
    .house-card {
      background: var(--card);
      border: 1px solid rgba(74,158,255,0.22);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(74,158,255,0.08);
    }
    .house-card-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 26px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.15);
    }
    .house-card-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
    .house-card-title svg { width: 18px; height: 18px; stroke: var(--blue); fill: none; }
    .live-badge {
      padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: rgba(74,158,255,0.1); color: var(--blue); border: 1px solid rgba(74,158,255,0.2);
      display: flex; align-items: center; gap: 5px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #canvas3d { width: 100%; height: 480px; display: block; cursor: grab; }
    #canvas3d:active { cursor: grabbing; }

    .house-card-controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 16px 26px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .ctrl { padding: 7px 15px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.04); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .ctrl:hover { background: rgba(74,158,255,0.1); color: var(--blue); border-color: rgba(74,158,255,0.3); }
    .ctrl-hint { margin-left: auto; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo-box">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h2>TMS Portal</h2>
    <p>Tenant Dashboard</p>
  </div>

  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <button class="nav-item active" onclick="showPage('house', this)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      3D House View
    </button>
  </div>

  <div class="sidebar-foot">
    <div class="user-row">
      <div class="avatar">T</div>
      <div>
        <div class="user-name">Tenant</div>
        <div class="user-role">🏠 Tenant</div>
      </div>
      <button class="logout-btn" onclick="window.location.href='../index.html'">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="page active" id="page-house">
    <div class="topbar">
      <div>
        <div class="pg-title">3D House View</div>
        <div class="pg-sub">Interactive 3D model of your property — drag to rotate</div>
      </div>
      <div class="role-pill">🏠 Tenant Portal</div>
    </div>

    <div class="house-card">
      <div class="house-card-top">
        <div class="house-card-title">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          My Property — 3D View
        </div>
        <div class="live-badge"><div class="live-dot"></div>Interactive</div>
      </div>

      <canvas id="canvas3d"></canvas>

      <div class="house-card-controls">
        <button class="ctrl" onclick="resetCam()">↺ Reset</button>
        <button class="ctrl" onclick="wireframe()">⬡ Wireframe</button>
        <button class="ctrl" onclick="frontView()">⬆ Front</button>
        <button class="ctrl" onclick="sideView()">➡ Side</button>
        <button class="ctrl" onclick="topView()">⬇ Top</button>
        <button class="ctrl" onclick="nightToggle()">🌙 Day / Night</button>
        <span class="ctrl-hint">🖱 Drag to rotate · Scroll to zoom</span>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../js/house3d.js"></script>
<script>
  function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    if (el) el.classList.add('active');
  }
  window.addEventListener('load', () => initHouse3D('canvas3d', 'tenant'));
  function resetCam()    { resetCamera3D('tenant'); }
  function wireframe()   { toggleWireframe('tenant'); }
  function frontView()   { rotateFront('tenant'); }
  function sideView()    { rotateSide('tenant'); }
  function topView()     { rotateTop('tenant'); }
  function nightToggle() { toggleDayNight(); }
</script>
</body>
</html>
